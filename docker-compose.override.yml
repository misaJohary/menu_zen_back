services:
  api:
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      SQL_ECHO: "true"

  db:
    ports:
      - "5432:5432"

  caddy:
    profiles: ["disabled"]
